# 工作流名称
name: Sync Gitee to GitHub (HTTPS+Token)

# 触发条件：定时 + 手动触发
on:
  # 定时触发（cron 表达式，UTC 时间）
  schedule:
    # 可选方案（选一个启用，注释掉其他）：
    # - cron: '0 */6 * * *'  # 每 6 小时同步一次
    # - cron: '0 0 * * *'    # 每天 UTC 0 点（北京时间 8 点）
    # - cron: '0 2 * * *'      # 每天 UTC 2 点（北京时间 10 点）
    # - cron: '0 0 */2 * *'   # 每 2 天同步一次
    - cron: '0 23 * * *'    # 每天 UTC 23 点（北京时间 7 点）
  # 手动触发（在 GitHub Actions 页面可点击运行）
  workflow_dispatch:

# 任务配置
jobs:
  sync-repo:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    # 核心改动：添加环境变量，强制使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # 任务步骤
    steps:
      # 步骤1：检出 GitHub 仓库代码
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整的提交历史（必须，否则同步不完整）
          # 关键1：使用有写入权限的令牌检出仓库
          token: ${{ secrets.GH_PUSH_TOKEN }}
          
      # 步骤2：配置 Git 身份（避免提交时权限报错）
      - name: Configure Git user
        run: |
          git config --global user.name "GitHub Actions Sync"
          git config --global user.email "actions-sync@github.com"

      # 步骤3：从 Gitee 拉取代码并同步到 GitHub
      - name: Sync from Gitee to GitHub
        env:
          # 从 GitHub 密钥中读取配置（需提前添加）
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          # 替换为你的 Gitee 仓库名（例如：my-project）
          GITEE_REPO_NAME: "pdfTrans"
          GH_USERNAME: "chunju-zhong"  # 替换为你的 GitHub 用户名（比如 xxx-zhong）
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          # 添加 Gitee 作为远程仓库
          git remote remove gitee || true
          git remote add gitee https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${GITEE_REPO_NAME}.git
          
          # 拉取 Gitee 所有分支和标签（强制覆盖本地）
          for i in {1..3}; do
            echo "第 $i 次拉取 Gitee 代码分支..."
            timeout 60 git fetch --all && break
            sleep 5
            if [ $i -eq 3 ]; then
              echo "❌ 拉取失败"
              exit 1
            fi
          done
          
          for i in {1..3}; do
            echo "第 $i 次拉取 Gitee 代码tags..."
            timeout 60 git fetch gitee --tags && break
            sleep 5
            if [ $i -eq 3 ]; then
              echo "❌ 拉取失败"
              exit 1
            fi
          done
          
          # 关键2：重新设置 origin 为带令牌的 URL（授权推送）
          git remote set-url origin https://${GH_USERNAME}:${GH_PUSH_TOKEN}@github.com/${GH_USERNAME}/${GITEE_REPO_NAME}.git

          # 推送到 GitHub（强制覆盖，确保同步一致）
          git push --force --tags origin  # 同步标签
          git push --force -u origin --all  # 同步所有分支（可选，如需同步多分支）

          echo "✅ 同步完成！"
